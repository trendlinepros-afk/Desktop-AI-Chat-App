name: CI

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  # Fast feedback on every push / PR: typecheck + production build.
  verify:
    if: startsWith(github.ref, 'refs/tags/') == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        # Electron's binary isn't needed to typecheck/bundle.
        run: ELECTRON_SKIP_BINARY_DOWNLOAD=1 npm ci
      - name: Typecheck + build
        run: npm run build

  # Build and publish the Windows installer on a version tag (vX.Y.Z).
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build renderer + main
        run: npm run build
      - name: Build & publish Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish always
